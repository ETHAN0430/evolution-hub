name: hy-memory
# kind: exclusive 表示同一时刻只能有一个 memory provider 激活（与 Hermes 官方
# memory provider 单选语义对齐：https://hermes-agent.nousresearch.com/docs/guides/build-a-hermes-plugin）
kind: exclusive
version: 0.2.6
description: "HY Memory — intelligent agent memory with LLM-driven extraction, evolution chains, and semantic search"
author: alvinfei
homepage: https://pypi.org/project/hy-memory/

# Hermes 配置向导用 requires_env 询问用户并写到 ~/.hermes/.env
# secret: true 的字段会写到 .env 而非明文 config.yaml
requires_env:
  - name: HY_MEMORY_USER_ID
    description: "Your unique memory namespace identifier"
    secret: false
    required: true
  - name: HY_MEMORY_AGENT_ID
    description: "Agent identifier for memory isolation (default: hermes)"
    secret: false
    required: false
  - name: HY_MEMORY_MODE
    description: "Processing mode: lite (fast) / pro (LLM extract) / ultra (pro + Graph)"
    secret: false
    required: false
  - name: OPENAI_API_KEY
    description: "OpenAI API key for embedder/LLM (or compatible MEMORY_EMBEDDER_API_KEY); required for pro/ultra"
    secret: true
    required: false

# 非官方字段，作为内部备注：plugin 跑起来需要先 pip install 这个 SDK
# 用户走 `hermes plugins enable hy-memory` 时不会自动 pip install；
# 需要先 `pip install hy-memory` 或 `pip install hermes-hy-memory`（后者作为依赖拉 SDK）。
pip_dependencies:
  - "hy-memory>=1.2.18"

# 实现的生命周期 hooks
hooks:
  - prefetch
  - sync_turn
  - on_session_end
  - on_pre_compress
  - on_memory_write

# 暴露给 LLM 的 tools（可选）
tools:
  - memory_search
  - memory_add
  - memory_delete
  - memory_list
